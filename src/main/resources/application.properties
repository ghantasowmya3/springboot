server.port=8001

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/sism
spring.datasource.username=postgres
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration - Make sure this is at least 32 characters
jwt.secret=mySuperSecretKeyForJWTTokenGeneration2024ThatIsLongEnough
jwt.expiration=86400000

# Logging
logging.level.com.sism=DEBUG
logging.level.org.springframework.web=DEBUG